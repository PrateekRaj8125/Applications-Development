<!DOCTYPE html>
<html>
<head>
    <title>Layout Using Frameset</title>
</head>

<!-- Root layout: 3 columns -->
<frameset cols="33%,33%,34%">

    <!-- Left column split into two rows -->
    <frameset rows="50%,50%">
        <frame src="frame1.html" name="frame1">
        <frame src="frame2.html" name="frame2">
    </frameset>

    <!-- Middle column (spans full height) -->
    <frame src="frame3.html" name="frame3">

    <!-- Right column (spans full height) -->
    <frame src="frame4.html" name="frame4">

</frameset>

</html>
