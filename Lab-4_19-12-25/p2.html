<html>
    <title>Confirm Message Box</title>
    <body>
        <script>
            function respond(){
                confirm("Are you sure you want to do this?");
            }
        </script>
        <h2>Want to click the button below? Do you dare.</h2>
        <form>
            <input type="button" value="Click and find out the consequences" onclick="respond()">
        </form>
    </body>
</html>
