<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Experience</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Registration Form</h1>
<br>
<p class="form-note"><b>Please fill in the details</b></p>
<form>
    <fieldset>
        <legend>Professional (Training / Placement) Information</legend>
        <label>Current Status:</label>
        <select>
            <option>Select</option>
            <option>Student</option>
            <option>Intern</option>
            <option>Employed</option>
            <option>Looking for Placement</option>
        </select>
        <label>Area of Training / Expertise:</label>
        <input type="text">
        <label>Previous Experience (if any):</label>
        <textarea rows="4"></textarea>
    </fieldset>
    <button type="button" onclick="window.location.href='page2.html'">Previous</button>
    <button type="button" onclick="window.location.href='feedback.html'">Submit</button>
</form>
</body>
</html>
