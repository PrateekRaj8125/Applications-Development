<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Service Request & Support Ticket</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<main>
    <h1>Online Service Request & Support Ticket</h1>
    <form action="/submit_ticket" method="POST" enctype="multipart/form-data">
        <section aria-labelledby="completion-heading">
            <h2 id="completion-heading" class="visually-hidden">Form Completion</h2>
            <label for="completion">Form Completion</label>
            <meter id="completion" min="0" max="100" value="1">1%</meter>
        </section>
        <fieldset>
            <legend>User Information</legend>
            <label for="ticketID">Ticket ID</label>
            <input type="number" id="ticketID" name="ticketID" required min="1">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" required autocomplete="name">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" required autocomplete="email">
            <label for="contact">Contact Number</label>
            <input type="tel" id="contact" name="contact" autocomplete="tel">
            <label for="website">Related Website</label>
            <input type="url" id="website" name="website" placeholder="https://example.com">
        </fieldset>
        <fieldset>
            <legend>Issue Details</legend>
            <label for="subject">Subject</label>
            <input type="text" id="subject" name="subject" required>
            <label for="issueDate">Issue Date</label>
            <input type="date" id="issueDate" name="issueDate" required>
            <label for="callTime">Preferred Call Time</label>
            <input type="time" id="callTime" name="callTime">
            <label for="problemType">Problem Type</label>
            <input list="problemOptions" id="problemType" name="problemType">
            <datalist id="problemOptions">
                <option value="Login Failure">
                <option value="Server Timeout">
                <option value="API Endpoint Error">
                <option value="UI Bug">
                <option value="Security Concern">
            </datalist>
            <fieldset>
                <legend>Issue Categories</legend>
                <label><input type="checkbox" name="category[]" value="network"> Network</label>
                <label><input type="checkbox" name="category[]" value="software"> Software</label>
                <label><input type="checkbox" name="category[]" value="hardware"> Hardware</label>
                <label><input type="checkbox" name="category[]" value="account"> Account</label>
            </fieldset>
            <label for="description">Detailed Description</label>
            <textarea id="description" name="description" rows="6" required></textarea>
            <label for="progress">Diagnostic Progress</label>
            <progress id="progress" value="20" max="100">20%</progress>
        </fieldset>
        <fieldset>
            <legend>Service Information</legend>
            <label for="serviceType">Affected Services</label>
            <select id="serviceType" name="serviceType[]" multiple size="6">
                <optgroup label="Devices">
                    <option value="desktop">Desktop</option>
                    <option value="laptop">Laptop</option>
                    <option value="mobile">Mobile</option>
                    <option value="tablet">Tablet</option>
                </optgroup>
                <optgroup label="Services">
                    <option value="cloud">Cloud Hosting</option>
                    <option value="database">Database</option>
                    <option value="api">API</option>
                    <option value="storage">File Storage</option>
                </optgroup>
            </select>
            <label for="attachment">Attach Files</label>
            <input type="file" id="attachment" name="attachment" accept=".png,.jpg,.jpeg,.pdf">
        </fieldset>
        <fieldset>
            <legend>Priority & Consent</legend>
            <fieldset>
                <legend>Priority Level</legend>
                <label><input type="radio" name="priority" value="low" required> Low</label>
                <label><input type="radio" name="priority" value="medium"> Medium</label>
                <label><input type="radio" name="priority" value="high"> High</label>
                <label><input type="radio" name="priority" value="critical"> Critical</label>
            </fieldset>
            <label for="urgency">Urgency (0–10)</label>
            <input type="range" id="urgency" name="urgency" min="0" max="10" value="1">
            <label>
                <input type="checkbox" id="consent" name="consent" required>
                I confirm the information provided is accurate and consent to processing.
            </label>
        </fieldset>
        <div class="form-actions">
            <button type="submit" onclick="window.location.href='submit.html'">Submit Ticket</button>
            <button type="reset">Reset Form</button>
        </div>
    </form>
</main>
</body>
</html>
