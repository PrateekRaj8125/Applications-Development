<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <h1>KIIT University</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#student">Add Student</a>
        <a href="#footer">About</a>
        <a href="mailto:crajprateek@gmail.com">Contact</a>
    </nav>
    <br><br>
    <button id="themeBtn">Change Theme</button>
    <br>
    <p id="dateTime"></p>
</header>

<main>
    <section id="student">
    <form id="studentForm">
        <h2>Student Registration</h2>
        <div class="form-group">
    <input type="text" id="name" placeholder="Name">
</div>

<div class="form-group">
    <input type="text" id="roll" placeholder="Roll Number">
</div>

<div class="form-group">
    <input type="email" id="email" placeholder="Email">
</div>

<div class="form-group">
    <select id="dept">
        <option value="">Select Department</option>
        <option>CSE</option>
        <option>ECE</option>
        <option>ME</option>
    </select>
</div>
        <div>
            <br>Select Year:
            <fieldset>
            <label><input type="radio" name="year" value="1st">1st</label><br>
            <label><input type="radio" name="year" value="2nd">2nd</label><br>
            <label><input type="radio" name="year" value="3rd">3rd</label><br>
            </fieldset>
        </div>

        <div>
            <br>Select Skills:
            <fieldset>
            <label><input type="checkbox" value="HTML">HTML</label><br>
            <label><input type="checkbox" value="CSS">CSS</label><br>
            <label><input type="checkbox" value="JS">JS</label><br>
            </fieldset>
        </div>

        <br><br><label for="photo">Upload Photo:</label>
        <input type="file" id="photo"><br>
        <br><textarea id="bio" placeholder="Short Bio"></textarea>
        <br>
        <button type="submit" class="btn">Submit</button>
        <button type="reset" class="btn">Reset</button>
    </form></section>
    <table id="studentTable">
    <thead>
        <tr>
            <th>Photo</th>
            <th>Name</th>
            <th>Roll</th>
            <th>Email</th>
            <th>Dept</th>
            <th>Year</th>
            <th>Skills</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody id="tableBody">
        
    </tbody>
    </table>

</main>
<br><br>
<footer><section id="footer">
    © Prateek | Roll No.:2305637 | <span id="footerDate"></span>
    </section>
</footer>

<script src="script.js"></script>
</body>
</html>
