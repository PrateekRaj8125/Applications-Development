<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Art</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        table {
            border-collapse: collapse;
            border: none;
        }
        td {
            width: 30px;
            height: 30px;
            border: none;
        }
        .container {
            text-align: center;
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .cyan { background-color: #4dd0e1; }
        .light-blue { background-color: #64b5f6; }
        .blue { background-color: #4285f4; }
        .purple { background-color: #7e57c2; }
        .violet { background-color: #ab47bc; }
        .pink { background-color: #f06292; }
        .magenta { background-color: #ec407a; }
        .rose { background-color: #e91e63; }
        .mint { background-color: #1ff00c; }
        .olive { background-color: #dce775; }
        .green { background-color: #56db9b; }
        .red { background-color: #ff3d00; }
        .lime { background-color: #cddc39; }
        .yellow { background-color: #ffe100; }
        .gold { background-color: #e0cd00; }
        .orange { background-color: #fb8c00; }
        .dark-orange { background-color: #f4511e; }
        .sea-blue { background-color: #42adf4; }
        .light-orange { background-color: #ff9d24; }

        .top-border {
            border-top: 3px solid black;
        }
        .bottom-border  {
            border-bottom: 3px solid black;
        }
        .left-border {
            border-left: 3px solid black;
        }
        .right-border {
            border-right: 3px solid black;
        }
    </style>
</head>
<body>
    <div class="container">
    <table border="0">
        <tr>
            <td class="white"></td>
            <td class="light-blue left-border top-border"></td>
            <td class="blue left-border top-border"></td>
            <td class="blue top-border"></td>
            <td class="blue top-border"></td>
            <td class="purple left-border top-border"></td>
            <td class="purple top-border"></td>
            <td class="violet left-border top-border"></td>
            <td class="white left-border"></td>
            <td class="white"></td>
        </tr>
        <tr>

            <td class="cyan left-border top-border right-border"></td>
            <td class="light-blue right-border"></td>
            <td class="sea-blue top-border bottom-border"></td>
            <td class="sea-blue top-border bottom-border"></td>
            <td class="sea-blue top-border right-border bottom-border"></td>
            <td class="purple bottom-border"></td>
            <td class="purple right-border bottom-border"></td>
            <td class="violet right-border bottom-border"></td>
            <td class="pink top-border right-border bottom-border"></td>
            <td class="white"></td>
        </tr>
        <tr>
            <td class="cyan left-border right-border bottom-border"></td>
            <td class="light-blue right-border bottom-border"></td>
            <td class="green right-border bottom-border"></td>
            <td class="white"></td>
            <td class="white"></td>
            <td class="white"></td>
            <td class="white"></td>
            <td class="magenta left-border bottom-border"></td>
            <td class="magenta right-border bottom-border"></td>
            <td class="white"></td>
        </tr>
        <tr>
            <td class="green left-border"></td>
            <td class="green right-border"></td>
            <td class="white"></td>
            <td class="white"></td>
            <td class="white"></td>
            <td class="white"></td>
            <td class="white"></td>
            <td class="rose left-border bottom-border"></td>
            <td class="rose bottom-border right-border"></td>
            <td class="white"></td>
        </tr>
        <tr>
            <td class="green left-border bottom-border"></td>
            <td class="green right-border bottom-border"></td>
            <td class="white"></td>
            <td class="white"></td>
            <td class="white"></td>
            <td class="white"></td>
            <td class="white"></td>
            <td class="white"></td>
            <td class="white"></td>
            <td class="white"></td>
        </tr>
        <tr>
            <td class="mint left-border"></td>
            <td class="mint right-border"></td>
            <td class="white"></td>
            <td class="white"></td>
            <td class="white"></td>
            <td class="white"></td>
            <td class="red left-border top-border bottom-border"></td>
            <td class="red top-border bottom-border"></td>
            <td class="red top-border bottom-border"></td>
            <td class="red bottom-border top-border right-border"></td>
        </tr>
        <tr>
            <td class="mint left-border"></td>
            <td class="mint right-border"></td>
            <td class="white"></td>
            <td class="white"></td>
            <td class="white"></td>
            <td class="white"></td>
            <td class="white"></td>
            <td class="orange left-border right-border"></td>
            <td class="dark-orange right-border"></td>
            <td class="white"></td>
        </tr>
        <tr>
            <td class="mint left-border"></td>
            <td class="mint right-border"></td>
            <td class="lime top-border right-border bottom-border"></td>
            <td class="white"></td>
            <td class="white"></td>
            <td class="white"></td>
            <td class="white"></td>
            <td class="orange left-border right-border"></td>
            <td class="dark-orange right-border"></td>
            <td class="white"></td>
        </tr>
        <tr>
            <td class="mint left-border bottom-border"></td>
            <td class="mint bottom-border right-border"></td>
            <td class="gold bottom-border"></td>
            <td class="gold top-border bottom-border"></td>
            <td class="gold top-border bottom-border"></td>
            <td class="gold top-border bottom-border"></td>
            <td class="gold top-border bottom-border right-border"></td>
            <td class="orange right-border"></td>
            <td class="dark-orange right-border bottom-border"></td>
            <td class="white"></td>
        </tr>
        <tr>
            <td class="white"></td>
            <td class="lime left-border right-border bottom-border"></td>
            <td class="yellow bottom-border"></td>
            <td class="yellow bottom-border right-border"></td>
            <td class="light-orange bottom-border"></td>
            <td class="light-orange bottom-border"></td>
            <td class="light-orange bottom-border right-border"></td>
            <td class="orange bottom-border right-border"></td>
            <td class="white"></td>
            <td class="white"></td>
        </tr>
    </table>
    </div>
</body>
</html>
